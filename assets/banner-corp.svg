<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="Mirror Corporation — voices outlive bodies">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B0B0C"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8C98A" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#E8C98A"/>
      <stop offset="100%" stop-color="#E8C98A" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>

  <!-- subtle horizontal lines (matrix feel, very faint) -->
  <g opacity="0.06" stroke="#E8C98A" stroke-width="0.5">
    <line x1="0" y1="60"  x2="1280" y2="60"/>
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="300" x2="1280" y2="300"/>
  </g>

  <!-- voice waves left -->
  <g fill="#E8C98A" opacity="0.55">
    <rect x="90"  y="172" width="3" height="16" rx="1.5"/>
    <rect x="105" y="162" width="3" height="36" rx="1.5"/>
    <rect x="120" y="152" width="3" height="56" rx="1.5"/>
    <rect x="135" y="138" width="3" height="84" rx="1.5"/>
    <rect x="150" y="158" width="3" height="44" rx="1.5"/>
    <rect x="165" y="170" width="3" height="20" rx="1.5"/>
    <rect x="180" y="148" width="3" height="64" rx="1.5"/>
    <rect x="195" y="166" width="3" height="28" rx="1.5"/>
    <rect x="210" y="174" width="3" height="12" rx="1.5"/>
  </g>

  <!-- voice waves right (mirrored) -->
  <g fill="#E8C98A" opacity="0.55">
    <rect x="1067" y="174" width="3" height="12" rx="1.5"/>
    <rect x="1082" y="166" width="3" height="28" rx="1.5"/>
    <rect x="1097" y="148" width="3" height="64" rx="1.5"/>
    <rect x="1112" y="170" width="3" height="20" rx="1.5"/>
    <rect x="1127" y="158" width="3" height="44" rx="1.5"/>
    <rect x="1142" y="138" width="3" height="84" rx="1.5"/>
    <rect x="1157" y="152" width="3" height="56" rx="1.5"/>
    <rect x="1172" y="162" width="3" height="36" rx="1.5"/>
    <rect x="1187" y="172" width="3" height="16" rx="1.5"/>
  </g>

  <!-- wordmark MIRROR -->
  <text x="640" y="180"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="98"
        font-weight="500"
        letter-spacing="58"
        text-anchor="middle"
        fill="#E8C98A"
        filter="url(#glow)">MIRROR</text>

  <!-- tagline -->
  <text x="640" y="232"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="26"
        font-style="italic"
        text-anchor="middle"
        fill="#F4F4EF"
        opacity="0.9">voices outlive bodies</text>

  <!-- divider -->
  <rect x="540" y="258" width="200" height="1" fill="url(#gold)" opacity="0.7"/>

  <!-- categories -->
  <text x="640" y="288"
        font-family="Inter, -apple-system, system-ui, sans-serif"
        font-size="11"
        font-weight="500"
        letter-spacing="4.5"
        text-anchor="middle"
        fill="#6EA8FF"
        opacity="0.85">DIGITAL IMMORTALITY · VOICE-FIRST AI · HERITAGE TECH</text>

  <!-- url -->
  <text x="640" y="328"
        font-family="Inter, -apple-system, system-ui, sans-serif"
        font-size="12"
        font-weight="400"
        letter-spacing="2"
        text-anchor="middle"
        fill="#F4F4EF"
        opacity="0.5">mirror-ai.app</text>
</svg>
