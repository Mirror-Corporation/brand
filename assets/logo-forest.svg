<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Mirror — forest edition">
  <defs>
    <radialGradient id="fbg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0E1C16"/>
      <stop offset="100%" stop-color="#07120D"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#fbg)"/>

  <!-- Bond Rings — concentric emerald -->
  <circle cx="256" cy="220" r="8"   fill="#3FBC8C"/>
  <circle cx="256" cy="220" r="40"  stroke="#3FBC8C" stroke-width="4" fill="none" opacity="0.7"/>
  <circle cx="256" cy="220" r="75"  stroke="#3FBC8C" stroke-width="3" fill="none" opacity="0.4"/>
  <circle cx="256" cy="220" r="110" stroke="#3FBC8C" stroke-width="2" fill="none" opacity="0.2"/>

  <!-- Wordmark Georgia italic letter-spacing 12 -->
  <text x="256" y="370"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="48"
        fill="#E8F2EA"
        letter-spacing="12"
        font-weight="400">MIRROR</text>

  <!-- Tagline tiny -->
  <text x="256" y="412"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="16"
        letter-spacing="2"
        fill="#3FBC8C"
        opacity="0.85">оживление</text>
</svg>
