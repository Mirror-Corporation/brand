<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="1280" height="420" role="img" aria-label="Mirror — это не клон. это оживление.">
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0E1C16"/>
      <stop offset="55%" stop-color="#07120D"/>
      <stop offset="100%" stop-color="#040A07"/>
    </radialGradient>
    <linearGradient id="emeraldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3FBC8C" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3FBC8C" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3FBC8C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D8B976" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D8B976" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#D8B976" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Forest night base -->
  <rect width="1280" height="420" fill="url(#vignette)"/>

  <!-- Subtle horizon grid (Михайловское fog) -->
  <g opacity="0.05" stroke="#E8F2EA" stroke-width="0.3">
    <line x1="0" y1="70"  x2="1280" y2="70"/>
    <line x1="0" y1="140" x2="1280" y2="140"/>
    <line x1="0" y1="210" x2="1280" y2="210"/>
    <line x1="0" y1="280" x2="1280" y2="280"/>
    <line x1="0" y1="350" x2="1280" y2="350"/>
  </g>

  <!-- Bond Rings (concentric, emerald) — left side decorative -->
  <g transform="translate(160 210)" opacity="0.4">
    <circle cx="0" cy="0" r="6"  fill="#3FBC8C"/>
    <circle cx="0" cy="0" r="32" stroke="#3FBC8C" stroke-width="1.4" fill="none" opacity="0.75"/>
    <circle cx="0" cy="0" r="60" stroke="#3FBC8C" stroke-width="1.0" fill="none" opacity="0.45"/>
    <circle cx="0" cy="0" r="88" stroke="#3FBC8C" stroke-width="0.7" fill="none" opacity="0.22"/>
  </g>

  <!-- Bond Rings — right side decorative (mirrored, fading) -->
  <g transform="translate(1120 210)" opacity="0.4">
    <circle cx="0" cy="0" r="6"  fill="#3FBC8C"/>
    <circle cx="0" cy="0" r="32" stroke="#3FBC8C" stroke-width="1.4" fill="none" opacity="0.75"/>
    <circle cx="0" cy="0" r="60" stroke="#3FBC8C" stroke-width="1.0" fill="none" opacity="0.45"/>
    <circle cx="0" cy="0" r="88" stroke="#3FBC8C" stroke-width="0.7" fill="none" opacity="0.22"/>
  </g>

  <!-- Centerline of dust -->
  <line x1="380" y1="305" x2="900" y2="305" stroke="url(#emeraldLine)" stroke-width="0.6" opacity="0.5"/>

  <!-- Wordmark MIRROR — Georgia italic 0.6em -->
  <text x="640" y="190"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="116"
        font-weight="400"
        letter-spacing="69.6"
        text-anchor="middle"
        fill="#E8F2EA"
        filter="url(#softGlow)">MIRROR</text>

  <!-- Russian pull-quote -->
  <text x="640" y="248"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="22"
        letter-spacing="2"
        text-anchor="middle"
        fill="#3FBC8C">это не клон.&#160;&#160;это оживление.</text>

  <!-- Divider -->
  <line x1="540" y1="278" x2="740" y2="278" stroke="url(#goldLine)" stroke-width="0.8"/>

  <!-- English line -->
  <text x="640" y="304"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="17"
        letter-spacing="1.5"
        text-anchor="middle"
        fill="#E8F2EA"
        opacity="0.78">we don't clone. we revive.</text>

  <!-- Categories — Space Grotesk feel via shields-friendly sans, here as inline Inter-fallback -->
  <text x="640" y="350"
        font-family="'Space Grotesk', Inter, -apple-system, system-ui, sans-serif"
        font-size="10"
        font-weight="500"
        letter-spacing="6"
        text-anchor="middle"
        fill="#D8B976"
        opacity="0.85">A PHONE TO THE PAST · A PHONE TO THE FUTURE</text>

  <!-- url + theme tag -->
  <text x="640" y="388"
        font-family="'Space Grotesk', Inter, -apple-system, system-ui, sans-serif"
        font-size="11"
        font-weight="400"
        letter-spacing="3"
        text-anchor="middle"
        fill="#7B9485">mirror-ai.app  ·  forest theme</text>
</svg>
